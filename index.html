<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HELLCUP PRIME ∞ NUKE EDITION</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #05040a;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 50% 0%, #3b2b5f 0, #05040a 60%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: linear-gradient(#1b1230, #05040a);
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
    touch-action: none;
  }
  #ui-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 6px 8px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    text-shadow: 0 0 4px #000;
    pointer-events: none;
  }
  #ui-left span, #ui-right span {
    margin-right: 8px;
  }
  #center-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 20px;
    text-shadow: 0 0 10px #000;
    pointer-events: none;
  }
  #center-msg small {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    opacity: 0.8;
  }

  #top-buttons {
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    pointer-events: auto;
    font-size: 10px;
  }
  .top-btn {
    padding: 3px 6px;
    border-radius: 6px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    user-select: none;
  }
  .top-btn.active {
    background: rgba(255,255,255,0.15);
  }

  #pause-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
  }

  #pause-overlay, #summary-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10;
  }
  #pause-overlay h2, #summary-overlay h2 {
    margin-bottom: 10px;
  }
  .pause-btn, .summary-btn {
    margin: 4px 0;
    padding: 6px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer;
    user-select: none;
    font-size: 13px;
  }

  #summary-stats {
    font-size: 13px;
    margin-bottom: 10px;
    text-align: left;
  }

  /* MOBILE CONTROLS */
  #controls {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 14px 14px 18px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .joystick-area {
    position: relative;
    width: 40vw;
    max-width: 260px;
    height: 40vw;
    max-height: 260px;
    pointer-events: auto;
  }
  .joy-base {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80%;
    height: 80%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
  }
  .joy-knob {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 46%;
    height: 46%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffffff, #bbbbff);
    box-shadow: 0 0 14px rgba(120,120,255,0.9);
    transition: transform 0.04s linear;
  }

  .buttons-area {
    position: relative;
    width: 50vw;
    max-width: 360px;
    height: 40vw;
    max-height: 260px;
    pointer-events: auto;
  }
  .btn {
    position: absolute;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffe9c0, #ff9b4a);
    box-shadow: 0 0 16px rgba(0,0,0,0.9);
    border: 2px solid rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #3b1200;
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    user-select: none;
    transform-origin: center;
    transition: transform 0.04s linear, box-shadow 0.04s linear;
  }
  .btn.active {
    transform: scale(0.93);
    box-shadow: 0 0 6px rgba(0,0,0,1);
  }
  .btn-label {
    position: absolute;
    top: -16px;
    font-size: 11px;
    color: #fff;
    text-shadow: 0 0 4px #000;
  }

  #btn-jump { right: 160px; bottom: 10px; }
  #btn-shoot { right: 40px; bottom: 60px; }
  #btn-dash { right: 210px; bottom: 110px; }
  #btn-nuke { right: 40px; bottom: 150px; width: 90px; height: 90px; }

  /* DASH CHARGES */
  #dash-ui {
    position: absolute;
    left: 8px;
    bottom: 70px;
    display: flex;
    gap: 4px;
    pointer-events: none;
  }
  .dash-orb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 4px rgba(0,0,0,0.8);
  }
  .dash-orb.full {
    background: radial-gradient(circle at 30% 30%, #ffffff, #88ddff);
    box-shadow: 0 0 10px rgba(120,200,255,0.9);
  }

  /* NUKE UI */
  #nuke-ui {
    position: absolute;
    right: 8px;
    bottom: 70px;
    font-size: 11px;
    text-align: right;
    pointer-events: none;
  }
  #nuke-bar {
    width: 90px;
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
    margin-top: 2px;
  }
  #nuke-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff8844, #ffdd55);
  }

  /* TOASTS */
  #toast-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    font-size: 12px;
  }

  /* META UI */
  #meta-ui {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    text-shadow: 0 0 4px #000;
    pointer-events: none;
  }

  @media (min-width: 900px) {
    #ui-overlay { font-size: 13px; }
    #center-msg { font-size: 24px; }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="960" height="540"></canvas>

  <div id="ui-overlay">
    <div id="ui-left">
      <span id="hpLabel">HP: 3</span>
      <span id="comboLabel">Combo: 0</span>
      <span id="heatLabel">Heat: 1.0</span>
      <span id="mutatorLabel"></span>
    </div>
    <div id="ui-right">
      <span id="scoreLabel">Score: 0</span>
      <span id="timeLabel">Time: 0s</span>
      <span id="hellcoinLabel">Hellcoins: 0</span>
    </div>
  </div>

  <div id="top-buttons">
    <div class="top-btn active" id="aimAssistBtn">Aim: Assist</div>
    <div class="top-btn" id="perfBtn">Perf: Normal</div>
  </div>

  <div id="pause-btn">II</div>

  <div id="pause-overlay">
    <h2>Paused</h2>
    <button class="pause-btn" id="resumeBtn">Resume</button>
    <button class="pause-btn" id="restartBtn">Restart Run</button>
  </div>

  <div id="summary-overlay">
    <h2>Run Summary</h2>
    <div id="summary-stats"></div>
    <button class="summary-btn" id="summaryRunBack">RUN IT BACK</button>
  </div>

  <div id="center-msg"></div>

  <div id="dash-ui">
    <div class="dash-orb" id="dashOrb1"></div>
    <div class="dash-orb" id="dashOrb2"></div>
  </div>

  <div id="nuke-ui">
    <div>NUKE</div>
    <div id="nuke-bar">
      <div id="nuke-bar-fill"></div>
    </div>
  </div>

  <div id="toast-layer"></div>

  <div id="meta-ui"></div>

  <div id="controls">
    <div class="joystick-area" id="joy-area">
      <div class="joy-base"></div>
      <div class="joy-knob" id="joy-knob"></div>
    </div>
    <div class="buttons-area">
      <div class="btn" id="btn-jump">
        <span class="btn-label">JUMP</span>
      </div>
      <div class="btn" id="btn-shoot">
        <span class="btn-label">SHOOT</span>
      </div>
      <div class="btn" id="btn-dash">
        <span class="btn-label">DASH</span>
      </div>
      <div class="btn" id="btn-nuke">
        <span class="btn-label">NUKE</span>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const hpLabel = document.getElementById("hpLabel");
  const scoreLabel = document.getElementById("scoreLabel");
  const comboLabel = document.getElementById("comboLabel");
  const heatLabel = document.getElementById("heatLabel");
  const timeLabel = document.getElementById("timeLabel");
  const hellcoinLabel = document.getElementById("hellcoinLabel");
  const mutatorLabel = document.getElementById("mutatorLabel");
  const msg = document.getElementById("center-msg");
  const toastLayer = document.getElementById("toast-layer");
  const metaUI = document.getElementById("meta-ui");

  const joyArea = document.getElementById("joy-area");
  const joyKnob = document.getElementById("joy-knob");
  const btnJump = document.getElementById("btn-jump");
  const btnShoot = document.getElementById("btn-shoot");
  const btnDash = document.getElementById("btn-dash");
  const btnNuke = document.getElementById("btn-nuke");

  const pauseBtn = document.getElementById("pause-btn");
  const pauseOverlay = document.getElementById("pause-overlay");
  const resumeBtn = document.getElementById("resumeBtn");
  const restartBtn = document.getElementById("restartBtn");

  const summaryOverlay = document.getElementById("summary-overlay");
  const summaryStats = document.getElementById("summary-stats");
  const summaryRunBack = document.getElementById("summaryRunBack");

  const aimAssistBtn = document.getElementById("aimAssistBtn");
  const perfBtn = document.getElementById("perfBtn");

  const dashOrb1 = document.getElementById("dashOrb1");
  const dashOrb2 = document.getElementById("dashOrb2");

  const nukeBarFill = document.getElementById("nuke-bar-fill");

  const W = canvas.width;
  const H = canvas.height;

  // ---------- SIMPLE SOUND SYSTEM ----------
  let audioCtx = null;
  const soundsEnabled = true;
  function initAudio() {
    if (!audioCtx && window.AudioContext) {
      audioCtx = new AudioContext();
    }
  }
  function playBeep(freq = 440, dur = 0.08, type = "square", vol = 0.15) {
    if (!soundsEnabled || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);
  }
  const SFX = {
    jump: () => playBeep(420, 0.08, "square", 0.12),
    shoot: () => playBeep(880, 0.04, "square", 0.08),
    hitEnemy: () => playBeep(520, 0.05, "sawtooth", 0.1),
    playerHit: () => playBeep(160, 0.12, "sawtooth", 0.18),
    pickup: () => playBeep(720, 0.06, "triangle", 0.12),
    upgrade: () => playBeep(960, 0.12, "triangle", 0.16),
    dash: () => playBeep(600, 0.06, "square", 0.12),
    dashHit: () => playBeep(260, 0.08, "square", 0.14),
    dashReady: () => playBeep(900, 0.08, "triangle", 0.12),
    miniSpawn: () => playBeep(260, 0.16, "sawtooth", 0.16),
    miniDeath: () => playBeep(120, 0.2, "triangle", 0.2),
    comboUp: () => playBeep(700, 0.04, "square", 0.1),
    comboBreak: () => playBeep(220, 0.08, "square", 0.12),
    dangerWarn: () => playBeep(480, 0.06, "square", 0.12),
    gameOver: () => playBeep(140, 0.3, "sawtooth", 0.2),
    heatUp: () => playBeep(540, 0.1, "triangle", 0.14),
    legendary: () => playBeep(1100, 0.18, "triangle", 0.18),
    nukeReady: () => playBeep(300, 0.2, "sawtooth", 0.2),
    nukeFire: () => playBeep(80, 0.4, "square", 0.25)
  };

  // ---------- TOASTS ----------
  const toasts = [];
  function addToast(text, opts = {}) {
    toasts.push({
      text,
      x: opts.x || W / 2,
      y: opts.y || H * 0.25,
      vx: opts.vx || 0,
      vy: opts.vy || -20,
      life: opts.life || 1.2,
      maxLife: opts.life || 1.2,
      size: opts.size || 14,
      color: opts.color || "#ffffff",
      align: opts.align || "center"
    });
  }

  function addPlayerToast(text, color = "#ffdd88") {
    if (!player) return;
    addToast(text, {
      x: player.x + player.w / 2,
      y: player.y - 10,
      life: 1.0,
      size: 13,
      color
    });
  }

  function addCornerToast(text, color = "#ffdd88") {
    addToast(text, {
      x: W * 0.5,
      y: 40,
      life: 1.4,
      size: 14,
      color
    });
  }

  // ---------- FUNNY LINES ----------
  const deathLines = [
    "bro got deleted",
    "sent to the shadow realm",
    "skill issue",
    "ratio'd",
    "he didn't respawn"
  ];
  const goblinTaunts = [
    "CAN'T CATCH ME LOSER",
    "MY LOOT IS MINE",
    "YOU'LL NEVER GET THIS",
    "OUTPLAYED",
    "TOO SLOW"
  ];
  const hitLines = [
    "ow.",
    "stop.",
    "bro chill.",
    "why.",
    "unnecessary."
  ];
  const legendaryLines = [
    "YOU ARE HIM",
    "GOD GAMER MODE",
    "ACTUALLY CRACKED",
    "THIS RUN IS THE ONE"
  ];

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ---------- INPUT ----------
  const keys = {};
  let joyTouchId = null;
  let joyCenter = { x: 0, y: 0 };
  let joyVector = { x: 0, y: 0 };
  let shootHeld = false;
  let jumpPressed = false;
  let dashPressed = false;
  let nukePressed = false;

  window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if ([" ", "ArrowUp", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
    if (e.key === "Escape") togglePause();
  });
  window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
  });

  function bindButtonTap(btn, onDown, onUp) {
    let activeId = null;
    const activate = () => btn.classList.add("active");
    const deactivate = () => btn.classList.remove("active");

    btn.addEventListener("touchstart", e => {
      e.preventDefault();
      initAudio();
      const t = e.changedTouches[0];
      activeId = t.identifier;
      activate();
      onDown();
    }, { passive: false });

    btn.addEventListener("touchmove", e => {
      e.preventDefault();
      if (activeId === null) return;
      let stillInside = false;
      for (const t of e.touches) {
        if (t.identifier === activeId) {
          const rect = btn.getBoundingClientRect();
          if (t.clientX >= rect.left - 20 && t.clientX <= rect.right + 20 &&
              t.clientY >= rect.top - 20 && t.clientY <= rect.bottom + 20) {
            stillInside = true;
          }
          break;
        }
      }
      if (!stillInside) {
        deactivate();
        onUp();
        activeId = null;
      }
    }, { passive: false });

    btn.addEventListener("touchend", e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === activeId) {
          deactivate();
          onUp();
          activeId = null;
          break;
        }
      }
    }, { passive: false });

    btn.addEventListener("touchcancel", e => {
      e.preventDefault();
      deactivate();
      onUp();
      activeId = null;
    }, { passive: false });
  }

  bindButtonTap(btnShoot, () => { shootHeld = true; }, () => { shootHeld = false; });
  bindButtonTap(btnJump, () => { jumpPressed = true; }, () => {});
  bindButtonTap(btnDash, () => { dashPressed = true; }, () => {});
  bindButtonTap(btnNuke, () => { nukePressed = true; }, () => {});

  joyArea.addEventListener("touchstart", e => {
    e.preventDefault();
    initAudio();
    for (const t of e.changedTouches) {
      if (joyTouchId === null) {
        joyTouchId = t.identifier;
        const rect = joyArea.getBoundingClientRect();
        joyCenter.x = rect.left + rect.width / 2;
        joyCenter.y = rect.top + rect.height / 2;
        updateJoystick(t.clientX, t.clientY);
        break;
      }
    }
  }, { passive: false });

  joyArea.addEventListener("touchmove", e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        updateJoystick(t.clientX, t.clientY);
        break;
      }
    }
  }, { passive: false });

  joyArea.addEventListener("touchend", e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        joyTouchId = null;
        joyVector.x = 0;
        joyVector.y = 0;
        resetJoystickKnob();
        break;
      }
    }
  }, { passive: false });

  function updateJoystick(cx, cy) {
    const dx = cx - joyCenter.x;
    const dy = cy - joyCenter.y;
    const maxDist = Math.min(joyArea.clientWidth, joyArea.clientHeight) * 0.4;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let nx = dx, ny = dy;
    if (dist > maxDist) {
      nx = dx / dist * maxDist;
      ny = dy / dist * maxDist;
      dist = maxDist;
    }
    joyVector.x = nx / maxDist;
    joyVector.y = ny / maxDist;
    joyKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  }

  function resetJoystickKnob() {
    joyKnob.style.transform = "translate(-50%, -50%)";
  }

  // ---------- META PROGRESSION ----------
  const META_KEY = "hellcup_meta_v1";
  let meta = {
    hellcoins: 0,
    maxHpBonus: 0,
    speedBonus: 0,
    fireRateBonus: 0,
    droneBonus: 0,
    dashChargeBonus: 0,
    critBonus: 0
  };

  function loadMeta() {
    try {
      const raw = localStorage.getItem(META_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        Object.assign(meta, parsed);
      }
    } catch (e) {}
    updateMetaUI();
  }

  function saveMeta() {
    try {
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    } catch (e) {}
  }

  function updateMetaUI() {
    hellcoinLabel.textContent = "Hellcoins: " + meta.hellcoins;
    metaUI.textContent =
      `Meta: HP+${meta.maxHpBonus} SPD+${meta.speedBonus*5}% FIRERATE+${meta.fireRateBonus*5}% DRONES+${meta.droneBonus} DASH+${meta.dashChargeBonus} CRIT+${meta.critBonus}%`;
  }

  // ---------- DAILY MUTATOR ----------
  const mutators = [
    { id: "double_goblins", label: "Mutator: Double Goblins", desc: "More treasure goblins spawn." },
    { id: "dash_frenzy", label: "Mutator: Dash Frenzy", desc: "Dash recharges faster." },
    { id: "explosive_day", label: "Mutator: Explosive Day", desc: "More explosive drops." },
    { id: "mini_marathon", label: "Mutator: Mini-Boss Marathon", desc: "Mini-bosses appear more often." },
    { id: "treasure_storm", label: "Mutator: Treasure Storm", desc: "Higher drop rates." }
  ];
  let activeMutator = null;

  function pickDailyMutator() {
    const today = new Date();
    const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
    const idx = seed % mutators.length;
    activeMutator = mutators[idx];
    mutatorLabel.textContent = activeMutator.label;
  }

  // ---------- GAME STATE ----------
  let lastTime = 0;
  let elapsed = 0;
  let player, bullets, enemyBullets, enemies, particles, drops, miniBoss;
  let dangerZones, goblinTimer;
  let score = 0;
  let combo = 0;
  let comboTimer = 0;
  let heat = 1.0;
  let difficulty = 1.0;
  let spawnTimer = 0;
  let miniBossTimer = 0;
  let shakeTime = 0;
  let shakeStrength = 0;
  let state = "intro"; // intro, playing, gameover
  let paused = false;

  let aimAssist = true;
  let performanceMode = false;

  // Slow-mo
  let slowmoTime = 0;
  const SLOWMO_FACTOR = 0.35;

  // Dash hybrid
  const baseMaxDashCharges = 2;
  let maxDashCharges = baseMaxDashCharges;
  let dashCharges = maxDashCharges;
  let dashRechargeTimer = 0;
  const dashRechargeTime = 1.8;
  let dashMiniCooldown = 0;

  // Dash visuals
  const afterimages = [];

  // Nuke
  let nukeCharge = 0; // 0..1
  let nukeReady = false;
  let nukesUsed = 0;

  // Player stats & upgrades
  const baseStats = {
    maxHp: 3,
    moveSpeed: 260,
    fireRate: 0.22,
    bulletDamage: 1,
    multiShot: 1,
    pierce: false,
    critChance: 0.0,
    dashCooldown: 0.6,
    homing: false,
    explosive: false,
    lifeSteal: 0,
    dashStrike: true,
    dashExplosion: false,
    chain: false,
    burn: false,
    drones: 0
  };
  const stats = JSON.parse(JSON.stringify(baseStats));
  let killsSinceHeal = 0;
  let weaponEvolution = null;

  const drones = [];

  // Milestones
  let nextMilestoneTime = 60; // every 60s
  let maxComboReached = 0;
  let maxHeatReached = 1;
  let goblinsCaught = 0;
  let miniBossesKilled = 0;

  function resetStats() {
    Object.assign(stats, baseStats);
    // apply meta bonuses
    stats.maxHp += meta.maxHpBonus;
    stats.moveSpeed *= (1 + meta.speedBonus * 0.05);
    stats.fireRate *= (1 - meta.fireRateBonus * 0.05);
    stats.drones += meta.droneBonus;
    stats.critChance += meta.critBonus * 0.01;
    maxDashCharges = baseMaxDashCharges + meta.dashChargeBonus;
    killsSinceHeal = 0;
    weaponEvolution = null;
    drones.length = 0;
  }

  function resetGame() {
    resetStats();
    player = {
      x: 160,
      y: H - 150,
      w: 40,

  function rectsOverlap(a, b) {
    return (
      a.x < b.x + b.w &&
      a.x + a.w > b.x &&
      a.y < b.y + b.h &&
      a.y + a.h > b.y
    );
  }

  function addParticles(x, y, color, count = 8, spread = 200) {
    const maxCount = performanceMode ? Math.floor(count * 0.4) : count;
    for (let i = 0; i < maxCount; i++) {
      particles.push({
        x,
        y,
        vx: (Math.random() - 0.5) * spread,
        vy: (Math.random() - 0.5) * spread,
        life: 0.4 + Math.random() * 0.4,
        color
      });
    }
  }

  function shake(duration, strength) {
    shakeTime = duration;
    shakeStrength = strength;
  }

  function getPhase() {
    if (elapsed < 60) return 1;
    if (elapsed < 180) return 2;
    return 3;
  }

  // ---------- ENEMIES ----------
  function spawnEnemy() {
    const phase = getPhase();
    const side = Math.random() < 0.5 ? -1 : 1;
    const x = side < 0 ? -60 : W + 60;
    const y = H - 120;

    let r = Math.random();
    let type = "runner";

    let wRunner, wJumper, wShooter, wTank;
    if (phase === 1) {
      wRunner = 0.8; wJumper = 0.2; wShooter = 0; wTank = 0;
    } else if (phase === 2) {
      wRunner = 0.5; wJumper = 0.25; wShooter = 0.2; wTank = 0.05;
    } else {
      wRunner = 0.35; wJumper = 0.25; wShooter = 0.25; wTank = 0.15;
    }
    const total = wRunner + wJumper + wShooter + wTank;
    r *= total;
    if (r < wRunner) type = "runner";
    else if (r < wRunner + wJumper) type = "jumper";
    else if (r < wRunner + wJumper + wShooter) type = "shooter";
    else type = "tank";

    let enemy = {
      type,
      x,
      y,
      w: 40,
      h: 60,
      vx: side < 0 ? 80 : -80,
      vy: 0,
      hp: 2,
      maxHp: 2,
      color: "#ff5555",
      shootTimer: 1 + Math.random(),
      behaviorTimer: 0,
      flash: 0,
      elite: false,
      goblin: false,
      burnTime: 0
    };

    const hpScale = 1 + (difficulty - 1) * 0.35;
    const speedScale = 1 + (difficulty - 1) * 0.2;

    if (type === "runner") {
      enemy.speed = (90 + difficulty * 8) * speedScale;
      enemy.hp = enemy.maxHp = Math.round(2 * hpScale);
      enemy.color = "#ff4444";
    } else if (type === "shooter") {
      enemy.speed = (70 + difficulty * 7) * speedScale;
      enemy.hp = enemy.maxHp = Math.round(3 * hpScale);
      enemy.color = "#ff9933";
    } else if (type === "jumper") {
      enemy.speed = (100 + difficulty * 9) * speedScale;
      enemy.hp = enemy.maxHp = Math.round(3 * hpScale);
      enemy.color = "#ff66cc";
    } else if (type === "tank") {
      enemy.speed = (60 + difficulty * 6) * speedScale;
      enemy.hp = enemy.maxHp = Math.round(6 * hpScale);
      enemy.color = "#aa2222";
      enemy.w = 50;
      enemy.h = 70;
    }

    if (getPhase() >= 3 && Math.random() < Math.min(0.05 + difficulty * 0.01, 0.25)) {
      enemy.elite = true;
      enemy.hp = enemy.maxHp = Math.round(enemy.hp * 1.8);
      enemy.speed *= 1.2;
      enemy.color = "#ffdd55";
    }

    if (performanceMode && enemies.length > 18) return;
    enemies.push(enemy);
  }

  function spawnGoblin() {
    const side = Math.random() < 0.5 ? -1 : 1;
    const x = side < 0 ? -60 : W + 60;
    const y = H - 140;
    const goblin = {
      type: "goblin",
      goblin: true,
      x,
      y,
      w: 32,
      h: 48,
      vx: side < 0 ? 220 : -220,
      vy: 0,
      hp: 3,
      maxHp: 3,
      color: "#55ff88",
      shootTimer: 0,
      behaviorTimer: 0,
      flash: 0,
      elite: false,
      burnTime: 0
    };
    enemies.push(goblin);
    addCornerToast("TREASURE GOBLIN!", "#55ff88");
    if (Math.random() < 0.7) {
      addCornerToast(randomFrom(goblinTaunts), "#55ff88");
    }
  }

  function spawnMiniBoss() {
    miniBoss = {
      x: W * 0.7,
      y: H * 0.25,
      w: 120,
      h: 120,
      vx: 0,
      vy: 0,
      hp: 60 + difficulty * 20,
      maxHp: 60 + difficulty * 20,
      phase: 1,
      attackTimer: 2,
      moveTimer: 0,
      telegraph: 0,
      flash: 0
    };
    addParticles(miniBoss.x + miniBoss.w / 2, miniBoss.y + miniBoss.h / 2, "#ffdd55", 30, 400);
    SFX.miniSpawn();
    addCornerToast("MINI-BOSS!", "#ffdd55");
  }

  function updateMiniBoss(dt) {
    if (!miniBoss) return;
    const b = miniBoss;

    const hpRatio = b.hp / b.maxHp;
    if (hpRatio < 0.33) b.phase = 3;
    else if (hpRatio < 0.66) b.phase = 2;
    else b.phase = 1;

    b.moveTimer -= dt;
    if (b.moveTimer <= 0) {
      b.moveTimer = 2 + Math.random() * 1.5;
      const targetX = W * (0.4 + Math.random() * 0.4);
      const targetY = H * (0.15 + Math.random() * 0.25);
      b.vx = (targetX - b.x) * 0.8;
      b.vy = (targetY - b.y) * 0.8;
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.vx *= Math.pow(0.4, dt);
    b.vy *= Math.pow(0.4, dt);

    b.attackTimer -= dt;
    if (b.attackTimer <= 0) {
      if (b.phase === 1) {
        miniBossFanShot();
        b.attackTimer = 2.2;
      } else if (b.phase === 2) {
        miniBossRainShot();
        b.attackTimer = 2.0;
      } else {
        miniBossBurstShot();
        b.attackTimer = 1.6;
      }
      b.telegraph = 0.4;
    }
    if (b.telegraph > 0) b.telegraph -= dt;
    if (b.flash > 0) b.flash -= dt;
  }

  function miniBossFanShot() {
    const b = miniBoss;
    if (!b || !player) return;
    const cx = b.x + b.w / 2;
    const cy = b.y + b.h / 2;
    const px = player.x + player.w / 2;
    const py = player.y + player.h / 2;
    const baseAngle = Math.atan2(py - cy, px - cx);
    const count = 7;
    const spread = Math.PI / 3;
    for (let i = 0; i < count; i++) {
      const t = (i / (count - 1)) - 0.5;
      const ang = baseAngle + t * spread;
      enemyBullets.push({
        x: cx,
        y: cy,
        w: 10,
        h: 10,
        vx: Math.cos(ang) * 260,
        vy: Math.sin(ang) * 260,
        life: 4,
        color: "#ffdd55"
      });
    }
  }

  function miniBossRainShot() {
    const count = 10;
    for (let i = 0; i < count; i++) {
      const x = 80 + Math.random() * (W - 160);
      enemyBullets.push({
        x,
        y: -20,
        w: 12,
        h: 18,
        vx: 0,
        vy: 320 + Math.random() * 80,
        life: 4,
        color: "#88ddff"
      });
    }
  }

  function miniBossBurstShot() {
    const b = miniBoss;
    if (!b) return;
    const cx = b.x + b.w / 2;
    const cy = b.y + b.h / 2;
    const count = 18;
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * Math.PI * 2;
      enemyBullets.push({
        x: cx,
        y: cy,
        w: 10,
        h: 10,
        vx: Math.cos(ang) * 220,
        vy: Math.sin(ang) * 220,
        life: 4,
        color: "#ff66aa"
      });
    }
  }

  // ---------- DANGER ZONES ----------
  function spawnDangerZone() {
    const radius = 60 + Math.random() * 40;
    const x = 80 + Math.random() * (W - 160);
    const y = H - 80;
    dangerZones.push({
      x,
      y,
      radius,
      timer: 2.0,
      exploded: false
    });
    SFX.dangerWarn();
    addCornerToast("DANGER ZONE!", "#ff5533");
  }

  // ---------- DROPS & UPGRADES ----------
  function spawnDrop(x, y, type, rarity = "common") {
    drops.push({
      type,
      rarity,
      x,
      y,
      w: 20,
      h: 20,
      vy: 0,
      life: 12
    });
  }

  function maybeSpawnDrop(x, y, elite = false, goblin = false) {
    let baseChance = elite ? 0.6 : 0.25;
    if (goblin) baseChance = 0.9;
    if (activeMutator && activeMutator.id === "treasure_storm") {
      baseChance *= 1.4;
    }
    if (Math.random() > baseChance) return;

    const roll = Math.random();
    if (roll < 0.25) {
      spawnDrop(x, y, "health", "common");
    } else if (roll < 0.5) {
      spawnDrop(x, y, "buff", "rare");
    } else if (roll < 0.8) {
      spawnDrop(x, y, "upgrade", goblin ? "legendary" : "epic");
    } else {
      spawnDrop(x, y, "nukeShard", "rare");
    }
  }

  function applyDrop(drop) {
    SFX.pickup();
    if (drop.type === "health") {
      if (player.hp < stats.maxHp) {
        player.hp++;
        hpLabel.textContent = "HP: " + player.hp;
        addParticles(drop.x, drop.y, "#88ff88", 14, 260);
        addPlayerToast("+1 HP", "#88ff88");
      }
    } else if (drop.type === "buff") {
      const buffType = Math.random();
      if (buffType < 0.2) {
        const factor = 0.5;
        stats.fireRate *= factor;
        addPlayerToast("RAPID FIRE!", "#88ddff");
        setTimeout(() => { stats.fireRate /= factor; }, 8000);
      } else if (buffType < 0.4) {
        const factor = 1.7;
        stats.bulletDamage *= factor;
        addPlayerToast("POWER SHOTS!", "#ffdd88");
        setTimeout(() => { stats.bulletDamage /= factor; }, 8000);
      } else if (buffType < 0.6) {
        player.invuln = Math.max(player.invuln, 3.0);
        addPlayerToast("SHIELD!", "#88ffcc");
      } else if (buffType < 0.8) {
        drops.forEach(d => {
          const dx = d.x - (player.x + player.w / 2);
          const dy = d.y - (player.y + player.h / 2);
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 260) {
            d.vy = -200;
          }
        });
        addPlayerToast("MEGA MAGNET!", "#88ddff");
      } else {
        const oldCooldown = stats.dashCooldown;
        stats.dashCooldown *= 0.2;
        addCornerToast("HYPER DASH!", "#ffdd88");
        setTimeout(() => { stats.dashCooldown = oldCooldown; }, 6000);
      }
      addParticles(drop.x, drop.y, "#88ddff", 14, 260);
    } else if (drop.type === "upgrade") {
      const roll = Math.random();
      let label = "";
      if (roll < 0.08) {
        stats.maxHp += 1;
        player.hp = Math.min(player.hp + 1, stats.maxHp);
        label = "MAX HP +1";
      } else if (roll < 0.16) {
        stats.moveSpeed *= 1.15;
        label = "SPEED UP";
      } else if (roll < 0.24) {
        stats.fireRate *= 0.8;
        label = "FIRE RATE UP";
      } else if (roll < 0.32) {
        stats.multiShot = Math.min(stats.multiShot + 1, 4);
        label = "MULTI-SHOT +1";
      } else if (roll < 0.4) {
        stats.pierce = true;
        label = "PIERCE SHOTS";
      } else if (roll < 0.48) {
        stats.critChance = Math.min(stats.critChance + 0.1, 0.5);
        label = "CRIT UP";
      } else if (roll < 0.56) {
        stats.homing = true;
        label = "HOMING SHOTS";
      } else if (roll < 0.64) {
        stats.explosive = true;
        label = "EXPLOSIVE SHOTS";
      } else if (roll < 0.72) {
        stats.lifeSteal += 0.05;
        label = "LIFE STEAL";
      } else if (roll < 0.8) {
        stats.chain = true;
        label = "CHAIN LIGHTNING";
      } else if (roll < 0.88) {
        stats.burn = true;
        label = "BURN DAMAGE";
      } else if (roll < 0.96) {
        stats.dashExplosion = true;
        label = "DASH EXPLOSION";
      } else {
        stats.drones = Math.min(stats.drones + 1, 3);
        spawnDrone();
        label = "DRONE +1";
      }
      checkWeaponEvolution();
      applyStatsToPlayer();
      addParticles(drop.x, drop.y, "#ffdd55", 18, 320);
      SFX.upgrade();
      addPlayerToast(label, "#ffdd55");
      if (drop.rarity === "legendary") {
        addCornerToast("LEGENDARY UPGRADE!", "#ffdd55");
        addCornerToast(randomFrom(legendaryLines), "#ffdd55");
        SFX.legendary();
        slowmoTime = 0.25;
      }
    } else if (drop.type === "nukeShard") {
      nukeCharge = Math.min(1, nukeCharge + 0.25);
      updateNukeUI();
      addPlayerToast("NUKE SHARD", "#ff8844");
      if (!nukeReady && nukeCharge >= 1) {
        nukeReady = true;
        addCornerToast("NUKE READY", "#ffdd55");
        SFX.nukeReady();
      }
      addParticles(drop.x, drop.y, "#ff8844", 14, 260);
    }
  }

  function spawnDrone() {
    drones.length = 0;
    for (let i = 0; i < stats.drones; i++) {
      drones.push({
        angle: (i / stats.drones) * Math.PI * 2,
        dist: 60,
        shootTimer: 0
      });
    }
  }

  function checkWeaponEvolution() {
    if (stats.multiShot >= 3 && stats.pierce && !weaponEvolution) {
      weaponEvolution = "Railgun";
      stats.bulletDamage *= 1.5;
      addCornerToast("RAILGUN EVOLUTION!", "#ffdd55");
      slowmoTime = 0.25;
    } else if (stats.fireRate < baseStats.fireRate * 0.6 && stats.critChance >= 0.2 && !weaponEvolution) {
      weaponEvolution = "Gatling";
      stats.fireRate *= 0.8;
      addCornerToast("GATLING EVOLUTION!", "#ffdd55");
      slowmoTime = 0.25;
    } else if (stats.multiShot >= 2 && stats.bulletDamage >= 2 && !weaponEvolution) {
      weaponEvolution = "Shotgun";
      addCornerToast("SHOTGUN EVOLUTION!", "#ffdd55");
      slowmoTime = 0.25;
    }
  }

  function applyStatsToPlayer() {
    player.speed = stats.moveSpeed;
    if (player.hp > stats.maxHp) player.hp = stats.maxHp;
    hpLabel.textContent = "HP: " + player.hp;
  }

  // ---------- PLAYER HIT ----------
  function playerHit(dmg, knockX, knockY) {
    const p = player;
    if (p.invuln > 0) return;
    p.hp -= dmg;
    hpLabel.textContent = "HP: " + p.hp;
    p.invuln = 1.0;
    p.vx = knockX * 0.4;
    p.vy = knockY || -520;
    addParticles(p.x + p.w / 2, p.y + p.h / 2, "#ffffff", 18, 420);
    shake(0.2, 6);
    SFX.playerHit();
    addCornerToast("HIT!", "#ff5555");
    if (Math.random() < 0.6) {
      addPlayerToast(randomFrom(hitLines), "#ff7777");
    }
    if (combo > 0) {
      SFX.comboBreak();
    }
    combo = 0;
    comboTimer = 0;
    comboLabel.textContent = "Combo: " + combo;
    if (p.hp <= 0) {
      state = "gameover";
      SFX.gameOver();
      showSummary();
    }
  }

  // ---------- PAUSE ----------
  function togglePause() {
    if (state !== "playing") return;
    paused = !paused;
    pauseOverlay.style.display = paused ? "flex" : "none";
  }

  pauseBtn.addEventListener("click", () => {
    initAudio();
    togglePause();
  });

  resumeBtn.addEventListener("click", () => {
    paused = false;
    pauseOverlay.style.display = "none";
  });

  restartBtn.addEventListener("click", () => {
    resetGame();
  });

  summaryRunBack.addEventListener("click", () => {

  });

  // ---------- SETTINGS BUTTONS ----------
  aimAssistBtn.addEventListener("click", () => {
    aimAssist = !aimAssist;
    aimAssistBtn.textContent = "Aim: " + (aimAssist ? "Assist" : "Manual");
    aimAssistBtn.classList.toggle("active", aimAssist);
  });

  perfBtn.addEventListener("click", () => {
    performanceMode = !performanceMode;
    perfBtn.textContent = "Perf: " + (performanceMode ? "Lite" : "Normal");
    perfBtn.classList.toggle("active", performanceMode);
  });

  function updateDashUI() {
    dashOrb1.classList.toggle("full", dashCharges >= 1);
    dashOrb2.classList.toggle("full", dashCharges >= 2);
  }

  function updateNukeUI() {
    nukeBarFill.style.width = (nukeCharge * 100).toFixed(1) + "%";
    btnNuke.style.opacity = nukeReady ? "1" : "0.5";
  }

  // ---------- NUKE ----------
  function triggerNuke() {
    if (!nukeReady) return;
    nukeReady = false;
    nukeCharge = 0;
    updateNukeUI();
    nukesUsed++;

    addCornerToast("MEGA NUKE!!!", "#ffdd55");
    SFX.nukeFire();
    slowmoTime = 0.4;
    shake(0.5, 14);
    addParticles(W/2, H/2, "#ffdd55", 80, 900);

    // Kill all normal enemies
    enemies.forEach(e => {
      const ex = e.x + e.w / 2;
      const ey = e.y + e.h / 2;
      addParticles(ex, ey, e.elite ? "#ffdd55" : (e.goblin ? "#55ff88" : "#ff5555"), 16, 360);
      maybeSpawnDrop(ex, ey, e.elite, e.goblin);
      if (e.goblin) goblinsCaught++;
      const baseGain = e.goblin ? 200 : 40 + (e.elite ? 60 : 0);
      const comboBonus = 1 + combo * 0.05;
      score += Math.round(baseGain * comboBonus);
    });
    enemies.length = 0;

    // Mini-boss damage
    if (miniBoss) {
      miniBoss.hp -= miniBoss.maxHp * 0.4;
      miniBoss.flash = 0.4;
      if (miniBoss.hp <= 0) {
        addParticles(miniBoss.x + miniBoss.w / 2, miniBoss.y + miniBoss.h / 2, "#ffdd55", 40, 520);
        shake(0.4, 10);
        spawnDrop(miniBoss.x + miniBoss.w / 2, miniBoss.y + miniBoss.h / 2, "upgrade", "legendary");
        miniBoss = null;
        combo += 5;
        comboTimer = 1.0;
        comboLabel.textContent = "Combo: " + combo;
        SFX.miniDeath();
        addCornerToast("MINI-BOSS DOWN!", "#ffdd55");
        slowmoTime = 0.3;
        miniBossesKilled++;
      }
    }

    scoreLabel.textContent = "Score: " + score;
    addPlayerToast("NUKE DEPLOYED", "#ffdd55");
  }

  // ---------- UPDATE ----------
  function update(rawDt) {
    let dt = rawDt;
    if (slowmoTime > 0) {
      slowmoTime -= dt;
      dt *= SLOWMO_FACTOR;
    }

    const p = player;
    const gravity = 1400;
    const groundY = H - 80;

    if (state === "intro") {
      if (keys["enter"] || keys[" "]) {
        state = "playing";
        msg.textContent = "";
      }
      return;
    }
    if (state === "gameover") return;
    if (paused) return;

    elapsed += dt;
    timeLabel.textContent = "Time: " + Math.floor(elapsed) + "s";

    const phase = getPhase();
    difficulty = 1 + elapsed * 0.03 + heat * 0.08;
    const oldHeat = heat;
    heat = Math.max(1, heat * (1 - dt * 0.02) + combo * 0.0004);
    heatLabel.textContent = "Heat: " + heat.toFixed(1);
    if (heat > maxHeatReached) maxHeatReached = heat;
    if (Math.floor(heat) > Math.floor(oldHeat)) {
      addCornerToast("HEAT LEVEL " + Math.floor(heat), "#ffdd55");
      SFX.heatUp();
    }

    if (combo > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) {
        combo = Math.max(0, combo - 1);
        comboTimer = 0.4;
        comboLabel.textContent = "Combo: " + combo;
      }
    }
    if (combo > maxComboReached) maxComboReached = combo;

    // Milestones
    if (elapsed >= nextMilestoneTime) {
      nextMilestoneTime += 60;
      const roll = Math.random();
      if (roll < 0.33) {
        stats.maxHp += 1;
        player.hp = Math.min(player.hp + 1, stats.maxHp);
        addCornerToast("MILESTONE: +1 MAX HP", "#88ff88");
      } else if (roll < 0.66) {
        stats.fireRate *= 0.9;
        addCornerToast("MILESTONE: FIRE RATE UP", "#88ddff");
      } else {
        stats.moveSpeed *= 1.1;
        addCornerToast("MILESTONE: SPEED UP", "#ffdd88");
      }
      applyStatsToPlayer();
    }

    let moveX = joyVector.x;
    if (keys["arrowleft"] || keys["a"]) moveX -= 1;
    if (keys["arrowright"] || keys["d"]) moveX += 1;
    moveX = Math.max(-1, Math.min(1, moveX));

    const jumpKey = keys["arrowup"] || keys["w"] || keys[" "];
    const dashKey = keys["shift"];
    const shootKey = keys["z"] || keys["j"];
    const nukeKey = keys["x"] || keys["k"];

    if (jumpKey) jumpPressed = true;
    if (dashKey) dashPressed = true;
    if (nukeKey) nukePressed = true;
    const shootActive = shootHeld || shootKey;

    const targetVx = moveX * p.speed;
    const accel = 2000;
    if (p.vx < targetVx) {
      p.vx = Math.min(targetVx, p.vx + accel * dt);
    } else if (p.vx > targetVx) {
      p.vx = Math.max(targetVx, p.vx - accel * dt);
    }
    if (Math.abs(moveX) < 0.1 && Math.abs(p.vx) < 20) p.vx = 0;

    if (moveX !== 0) p.facing = moveX > 0 ? 1 : -1;

    if (p.onGround) p.coyote = 0.12;
    else p.coyote -= dt;
    if (jumpPressed) p.jumpBuffer = 0.12;
    else p.jumpBuffer -= dt;

    if (p.jumpBuffer > 0 && p.coyote > 0) {
      p.vy = -p.jumpPower;
      p.onGround = false;
      p.coyote = 0;
      p.jumpBuffer = 0;
      addParticles(p.x + p.w / 2, p.y + p.h, "#ffffff", 10, 260);
      SFX.jump();
    }
    jumpPressed = false;

    if (p.dashCooldown > 0) p.dashCooldown -= dt;
    if (dashMiniCooldown > 0) dashMiniCooldown -= dt;

    if (p.dashTime > 0) {
      p.dashTime -= dt;
    } else {
      p.dashTime = 0;
    }

    // Dash recharge
    if (dashCharges < maxDashCharges) {
      let rechargeSpeed = 1;
      if (activeMutator && activeMutator.id === "dash_frenzy") rechargeSpeed = 1.5;
      dashRechargeTimer += dt * rechargeSpeed;
      if (dashRechargeTimer >= dashRechargeTime) {
        dashRechargeTimer -= dashRechargeTime;
        dashCharges++;
        updateDashUI();
        addCornerToast(dashCharges === maxDashCharges ? "DOUBLE DASH READY" : "DASH READY", "#88ddff");
        SFX.dashReady();
      }
    } else {
      dashRechargeTimer = 0;
    }

    // Dash trigger
    if (dashPressed && dashCharges > 0 && dashMiniCooldown <= 0) {
      dashCharges--;
      updateDashUI();
      dashMiniCooldown = 0.25;
      p.dashTime = 0.16;
      p.dashCooldown = stats.dashCooldown;
      const dashDir = p.facing || 1;
      p.vx += dashDir * 900;
      if (!p.onGround) {
        p.vy -= 200; // dash cancel boost
      }
      p.invuln = Math.max(p.invuln, 0.45);
      addParticles(p.x + p.w / 2, p.y + p.h / 2, "#88ddff", 18, 520);
      SFX.dash();
      addPlayerToast("DASH!", "#88ddff");
      if (Math.random() < 0.4) {
        addPlayerToast("EXCUSE ME", "#88ddff");
      }
      afterimages.push({
        x: p.x,
        y: p.y,
        facing: p.facing,
        life: 0.25
      });
      // Dash strike hitbox
      if (stats.dashStrike) {
        const hitbox = {
          x: p.x + (dashDir > 0 ? p.w : -60),
          y: p.y,
          w: 60,
          h: p.h
        };
        let killed = false;
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          if (rectsOverlap(hitbox, e)) {
            e.hp -= stats.bulletDamage * 2;
            e.flash = 0.12;
            addParticles(e.x + e.w / 2, e.y + e.h / 2, "#88ddff", 10, 320);
            if (e.hp <= 0) {
              killed = true;
              const ex = e.x + e.w / 2;
              const ey = e.y + e.h / 2;
              addParticles(ex, ey, e.elite ? "#ffdd55" : (e.goblin ? "#55ff88" : "#ff5555"), 16, 360);
              maybeSpawnDrop(ex, ey, e.elite, e.goblin);
              if (e.goblin) goblinsCaught++;
              enemies.splice(i, 1);
              const baseGain = e.goblin ? 120 : 20 + (e.elite ? 40 : 0);
              const comboBonus = 1 + combo * 0.05;
              score += Math.round(baseGain * comboBonus);
              scoreLabel.textContent = "Score: " + score;
              combo++;
              comboTimer = 0.6;
              comboLabel.textContent = "Combo: " + combo;
              SFX.comboUp();
            }
          }
        }
        if (killed) {
          addPlayerToast("DASH KILL!", "#ffdd55");
          SFX.dashHit();
        }
      }
      p._dashExplodePending = stats.dashExplosion;
    }
    dashPressed = false;

    // Nuke trigger
    if (nukePressed) {
      triggerNuke();
    }
    nukePressed = false;

    p.vy += gravity * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    if (p.y + p.h > groundY) {
      p.y = groundY - p.h;
      p.vy = 0;
      p.onGround = true;
      if (p._dashExplodePending) {
        dashExplosion(p.x + p.w / 2, p.y + p.h / 2);
        p._dashExplodePending = false;
      }
    } else {
      p.onGround = false;
    }

    p.x = Math.max(40, Math.min(W - 80, p.x));
    if (p.invuln > 0) p.invuln -= dt;

    // Afterimages
    if (p.dashTime > 0) {
      afterimages.push({
        x: p.x,
        y: p.y,
        facing: p.facing,
        life: 0.25
      });
    }
    for (let i = afterimages.length - 1; i >= 0; i--) {
      afterimages[i].life -= dt;
      if (afterimages[i].life <= 0) afterimages.splice(i, 1);
    }

    // Aim
    let aimAngle = p.facing > 0 ? 0 : Math.PI;
    let bestDist = Infinity;
    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;

    function considerTarget(tx, ty) {
      const dx = tx - cx;
      const dy = ty - cy;
      const d2 = dx*dx + dy*dy;
      if (d2 < bestDist) {
        bestDist = d2;
        aimAngle = Math.atan2(dy, dx);
      }
    }

    if (aimAssist) {
      enemies.forEach(e => considerTarget(e.x + e.w / 2, e.y + e.h / 2));
      if (miniBoss) considerTarget(miniBoss.x + miniBoss.w / 2, miniBoss.y + miniBoss.h / 2);
    }

    if (p.shootCooldown > 0) p.shootCooldown -= dt;
    if (shootActive && p.shootCooldown <= 0) {
      const speed = 520;
      let count = stats.multiShot;
      if (weaponEvolution === "Shotgun") count = Math.max(count + 2, 3);
      const spread = (count > 1) ? (weaponEvolution === "Shotgun" ? Math.PI / 6 : Math.PI / 16) : 0;
      for (let i = 0; i < count; i++) {
        const t = count === 1 ? 0 : (i / (count - 1) - 0.5);
        const ang = aimAngle + t * spread;
        bullets.push({
          x: cx + Math.cos(ang) * 24,
          y: cy + Math.sin(ang) * 10,
          w: 16,
          h: 8,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed,
          life: 0.9,
          pierceLeft: stats.pierce ? 1 : 0,
          damage: stats.bulletDamage,
          homing: stats.homing,
          explosive: stats.explosive,
          chainHits: stats.chain ? 2 : 0,
          burn: stats.burn
        });
      }
      p.shootCooldown = stats.fireRate;
      SFX.shoot();
    }

    // Drones
    drones.forEach((d, idx) => {
      d.angle += dt * (0.8 + idx * 0.2);
      const dx = Math.cos(d.angle) * d.dist;
      const dy = Math.sin(d.angle) * d.dist * 0.5;
      d.x = cx + dx;
      d.y = cy + dy - 10;
      d.shootTimer -= dt;
      if (d.shootTimer <= 0) {
        d.shootTimer = 0.8;
        if (enemies.length > 0) {
          let best = enemies[0];
          let bestD2 = Infinity;
          enemies.forEach(e => {
            const ex = e.x + e.w / 2;
            const ey = e.y + e.h / 2;
            const dx2 = ex - d.x;
            const dy2 = ey - d.y;
            const d2 = dx2*dx2 + dy2*dy2;
            if (d2 < bestD2) {
              bestD2 = d2;
              best = e;
            }
          });
          const ex = best.x + best.w / 2;
          const ey = best.y + best.h / 2;
          const ang = Math.atan2(ey - d.y, ex - d.x);
          bullets.push({
            x: d.x,
            y: d.y,
            w: 12,
            h: 6,
            vx: Math.cos(ang) * 480,
            vy: Math.sin(ang) * 480,
            life: 0.8,
            pierceLeft: 0,
            damage: stats.bulletDamage * 0.7,
            homing: false,
            explosive: false,
            chainHits: 0,
            burn: false
          });
        }
      }
    });

    // Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];

      if (b.homing && enemies.length > 0) {
        let best = null;
        let bestD2 = Infinity;
        enemies.forEach(e => {
          const ex = e.x + e.w / 2;
          const ey = e.y + e.h / 2;
          const dx = ex - b.x;
          const dy = ey - b.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < bestD2) {
            bestD2 = d2;
            best = { dx, dy };
          }
        });
        if (best) {
          const ang = Math.atan2(best.dy, best.dx);
          const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
          const turn = 6 * dt;
          const curAng = Math.atan2(b.vy, b.vx);
          let diff = ang - curAng;
          while (diff > Math.PI) diff -= Math.PI*2;
          while (diff < -Math.PI) diff += Math.PI*2;
          const newAng = curAng + Math.max(-turn, Math.min(turn, diff));
          b.vx = Math.cos(newAng) * speed;
          b.vy = Math.sin(newAng) * speed;
        }
      }

      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      if (b.life <= 0 || b.x < -60 || b.x > W + 60 || b.y < -60 || b.y > H + 60) {
        bullets.splice(i, 1);
      }
    }

    // Enemy bullets
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const eb = enemyBullets[i];
      eb.x += eb.vx * dt;
      eb.y += eb.vy * dt;
      eb.life -= dt;
      if (eb.life <= 0 || eb.x < -80 || eb.x > W + 80 || eb.y < -80 || eb.y > H + 80) {
        enemyBullets.splice(i, 1);
        continue;
      }
      if (p.invuln <= 0 && rectsOverlap(p, eb)) {
        enemyBullets.splice(i, 1);
        playerHit(1, eb.vx, eb.vy);
      }
    }

    // Spawns
    const baseSpawnInterval = phase === 1 ? 1.2 : phase === 2 ? 0.9 : 0.6;
    const spawnInterval = Math.max(0.25, baseSpawnInterval / (1 + (difficulty - 1) * 0.3));
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = spawnInterval;
    }

    let goblinInterval = 25 + Math.random() * 15;
    if (activeMutator && activeMutator.id === "double_goblins") {
      goblinInterval *= 0.6;
    }
    goblinTimer -= dt;
    if (goblinTimer <= 0) {
      spawnGoblin();
      goblinTimer = goblinInterval;
    }

    let miniInterval = 45 + Math.random() * 20;
    if (activeMutator && activeMutator.id === "mini_marathon") {
      miniInterval *= 0.7;
    }
    miniBossTimer -= dt;
    if (miniBossTimer <= 0 && !miniBoss && phase >= 2) {
      spawnMiniBoss();
      miniBossTimer = miniInterval;
    }

    if (!performanceMode && phase >= 2) {
      if (Math.random() < dt * 0.15) {
        spawnDangerZone();
      }
    }

    // Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const ex = e.x + e.w / 2;
      const ey = e.y + e.h / 2;

      if (e.goblin) {
        if ((e.vx > 0 && e.x > W - 80) || (e.vx < 0 && e.x < 80)) {
          addCornerToast("GOBLIN ESCAPING!", "#ff5555");
        }
      }

      if (e.goblin) {
        e.vy += gravity * dt * 0.4;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (e.y + e.h > groundY) {
          e.y = groundY - e.h;
          e.vy = 0;
        }
      } else if (e.type === "runner") {
        const dir = ex < cx ? 1 : -1;
        e.vx = dir * e.speed;
        if (Math.random() < 0.01 && e.y + e.h >= groundY - 1) {
          e.vy = -400;
        }
        e.vy += gravity * dt * 0.7;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (e.y + e.h > groundY) {
          e.y = groundY - e.h;
          e.vy = 0;
        }
      } else if (e.type === "shooter") {
        const desiredDist = 260;
        const dx = cx - ex;
        const dist = Math.abs(dx);
        if (dist > desiredDist + 40) e.vx = (dx > 0 ? 1 : -1) * e.speed;
        else if (dist < desiredDist - 40) e.vx = (dx > 0 ? -1 : 1) * e.speed;
        else e.vx = 0;

        if (difficulty >= 10) {
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 1.6 + Math.random() * 0.6;
            const ang = Math.atan2(cy - ey, cx - ex);
            enemyBullets.push({
              x: ex,
              y: ey,
              w: 10,
              h: 10,
              vx: Math.cos(ang) * 220,
              vy: Math.sin(ang) * 220,
              life: 4,
              color: e.elite ? "#ffdd88" : "#ffaa55"
            });
          }
        }
        e.vy += gravity * dt * 0.7;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (e.y + e.h > groundY) {
          e.y = groundY - e.h;
          e.vy = 0;
        }
      } else if (e.type === "jumper") {
        e.behaviorTimer -= dt;
        if (e.behaviorTimer <= 0 && e.y + e.h >= groundY - 1) {
          e.behaviorTimer = 1.4 + Math.random() * 0.6;
          const dx = cx - ex;
          e.vx = (dx > 0 ? 1 : -1) * e.speed;
          e.vy = -520;
        }
        e.vy += gravity * dt * 0.7;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (e.y + e.h > groundY) {
          e.y = groundY - e.h;
          e.vy = 0;
        }
      } else if (e.type === "tank") {
        const dir = ex < cx ? 1 : -1;
        e.vx = dir * e.speed * 0.6;
        e.vy += gravity * dt * 0.7;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (e.y + e.h > groundY) {
          e.y = groundY - e.h;
          e.vy = 0;
        }
      }

      if (e.x < -260 || e.x > W + 260) {
        enemies.splice(i, 1);
        continue;
      }

      if (e.flash > 0) e.flash -= dt;

      // Burn damage
      if (e.burnTime > 0) {
        e.burnTime -= dt;
        if (e.burnTime > 0) {
          e.hp -= dt * 0.8;
          if (e.hp <= 0) {
            const ex2 = e.x + e.w / 2;
            const ey2 = e.y + e.h / 2;
            addParticles(ex2, ey2, "#ff8844", 16, 360);
            maybeSpawnDrop(ex2, ey2, e.elite, e.goblin);
            if (e.goblin) goblinsCaught++;
            enemies.splice(i, 1);
            const baseGain = e.goblin ? 120 : 20 + (e.elite ? 40 : 0);
            const comboBonus = 1 + combo * 0.05;
            score += Math.round(baseGain * comboBonus);
            scoreLabel.textContent = "Score: " + score;
            combo++;
            comboTimer = 0.6;
            comboLabel.textContent = "Combo: " + combo;
            SFX.comboUp();
            continue;
          }
        }
      }

      // Bullet collisions
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (rectsOverlap(e, b)) {
          let dmg = b.damage;
          if (Math.random() < stats.critChance) dmg *= 2;
          e.hp -= dmg;
          e.flash = 0.12;
          addParticles(b.x + b.w / 2, b.y + b.h / 2, "#ffdd88", 6, 260);
          SFX.hitEnemy();
          if (b.burn && e.hp > 0) {
            e.burnTime = Math.max(e.burnTime, 2.0);
          }
          if (e.hp <= 0) {
            const ex2 = e.x + e.w / 2;
            const ey2 = e.y + e.h / 2;
            addParticles(ex2, ey2, e.elite ? "#ffdd55" : (e.goblin ? "#55ff88" : "#ff5555"), 16, 360);
            maybeSpawnDrop(ex2, ey2, e.elite, e.goblin);
            if (e.goblin) goblinsCaught++;
            enemies.splice(i, 1);
            const baseGain = e.goblin ? 120 : 20 + (e.elite ? 40 : 0);
            const comboBonus = 1 + combo * 0.05;
            score += Math.round(baseGain * comboBonus);
            scoreLabel.textContent = "Score: " + score;
            combo++;
            comboTimer = 0.6;
            comboLabel.textContent = "Combo: " + combo;
            SFX.comboUp();
            if (combo === 10 || combo === 25 || combo === 50) {
              addCornerToast("COMBO x" + combo + "!", "#ffdd55");
              slowmoTime = 0.2;
            }
            if (stats.lifeSteal > 0) {
              killsSinceHeal++;
              if (killsSinceHeal >= Math.max(5, Math.round(20 * (1 - stats.lifeSteal)))) {
                killsSinceHeal = 0;
                if (player.hp < stats.maxHp) {
                  player.hp++;
                  hpLabel.textContent = "HP: " + player.hp;
                  addPlayerToast("LIFE STEAL", "#88ff88");
                }
              }
            }
            if (Math.random() < 0.01) {
              addPlayerToast(randomFrom(deathLines), "#ffdd55");
            }
          }

          // Chain lightning
          if (stats.chain && b.chainHits > 0) {
            let bestE = null;
            let bestD2 = Infinity;
            enemies.forEach(e2 => {
              if (e2 === e) return;
              const dx2 = (e2.x + e2.w / 2) - (e.x + e.w / 2);
              const dy2 = (e2.y + e2.h / 2) - (e.y + e.h / 2);
              const d2 = dx2*dx2 + dy2*dy2;
              if (d2 < bestD2 && d2 < 200*200) {
                bestD2 = d2;
                bestE = e2;
              }
            });
            if (bestE) {
              bestE.hp -= dmg * 0.6;
              bestE.flash = 0.12;
              addParticles(bestE.x + bestE.w / 2, bestE.y + bestE.h / 2, "#88ddff", 8, 260);
              b.chainHits--;
            }
          }

          if (b.explosive || (activeMutator && activeMutator.id === "explosive_day")) {
            addParticles(b.x, b.y, "#ffaa55", 20, 360);
            enemies.forEach(e2 => {
              const dx = (e2.x + e2.w / 2) - b.x;
              const dy = (e2.y + e2.h / 2) - b.y;
              if (dx*dx + dy*dy < 120*120) {
                e2.hp -= b.damage * 0.6;
                e2.flash = 0.12;
              }
            });
          }
          if (stats.pierce && b.pierceLeft > 0) {
            b.pierceLeft--;
          } else {
            bullets.splice(j, 1);
          }
          break;
        }
      }

      if (p.invuln <= 0 && rectsOverlap(p, e)) {
        playerHit(1, e.vx, -400);
      }
    }

    // Mini-boss
    if (miniBoss) {
      updateMiniBoss(dt);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (rectsOverlap(miniBoss, b)) {
          let dmg = b.damage;
          if (Math.random() < stats.critChance) dmg *= 2;
          miniBoss.hp -= dmg;
          miniBoss.flash = 0.12;
          addParticles(b.x + b.w / 2, b.y + b.h / 2, "#ffffff", 8, 260);
          const gain = 10;
          const comboBonus = 1 + combo * 0.05;
          score += Math.round(gain * comboBonus);
          scoreLabel.textContent = "Score: " + score;
          if (stats.pierce && b.pierceLeft > 0) {
            b.pierceLeft--;
          } else {
            bullets.splice(i, 1);
          }
          if (miniBoss.hp <= 0) {
            addParticles(miniBoss.x + miniBoss.w / 2, miniBoss.y + miniBoss.h / 2, "#ffdd55", 40, 520);
            shake(0.4, 10);
            spawnDrop(miniBoss.x + miniBoss.w / 2, miniBoss.y + miniBoss.h / 2, "upgrade", "legendary");
            miniBoss = null;
            combo += 5;
            comboTimer = 1.0;
            comboLabel.textContent = "Combo: " + combo;
            SFX.miniDeath();
            addCornerToast("MINI-BOSS DOWN!", "#ffdd55");
            slowmoTime = 0.3;
            miniBossesKilled++;
          }
        }
      }

      if (miniBoss && p.invuln <= 0 && rectsOverlap(p, miniBoss)) {
        playerHit(1, (p.x < miniBoss.x ? -1 : 1) * 600, -600);
      }
    }

    // Drops
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      d.vy += gravity * 0.4 * dt;
      d.y += d.vy * dt;
      if (d.y + d.h > groundY) {
        d.y = groundY - d.h;
        d.vy = 0;
      }
      d.life -= dt;
      if (d.life <= 0) {
        drops.splice(i, 1);
        continue;
      }
      if (rectsOverlap(d, { x: p.x, y: p.y, w: p.w, h: p.h })) {
        applyDrop(d);
        drops.splice(i, 1);
      }
    }

    // Danger zones
    for (let i = dangerZones.length - 1; i >= 0; i--) {
      const z = dangerZones[i];
      z.timer -= dt;
      if (!z.exploded && z.timer <= 0) {
        z.exploded = true;
        addParticles(z.x, z.y, "#ff5533", 30, 420);
        shake(0.25, 8);
        const dx = (p.x + p.w / 2) - z.x;
        const dy = (p.y + p.h) - z.y;
        if (dx*dx + dy*dy < (z.radius * 1.1) * (z.radius * 1.1)) {
          playerHit(1, dx, -600);
        }
      }
      if (z.timer <= -0.4) {
        dangerZones.splice(i, 1);
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pa = particles[i];
      pa.x += pa.vx * dt;
      pa.y += pa.vy * dt;
      pa.vy += 600 * dt;
      pa.life -= dt;
      if (pa.life <= 0) particles.splice(i, 1);
    }

    // Toasts
    for (let i = toasts.length - 1; i >= 0; i--) {
      const t = toasts[i];
      t.x += t.vx * dt;
      t.y += t.vy * dt;
      t.life -= dt;
      if (t.life <= 0) toasts.splice(i, 1);
    }

    if (shakeTime > 0) shakeTime -= dt;
  }

  function dashExplosion(x, y) {
    addParticles(x, y, "#ffdd88", 24, 520);
    shake(0.25, 8);
    addPlayerToast("DASH BLAST!", "#ffdd88");
    SFX.dashHit();
    const radius = 80;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const dx = (e.x + e.w / 2) - x;
      const dy = (e.y + e.h / 2) - y;
      if (dx*dx + dy*dy < radius*radius) {
        e.hp -= stats.bulletDamage;
        e.flash = 0.12;
        if (e.hp <= 0) {
          const ex2 = e.x + e.w / 2;
          const ey2 = e.y + e.h / 2;
          addParticles(ex2, ey2, e.elite ? "#ffdd55" : (e.goblin ? "#55ff88" : "#ff5555"), 16, 360);
          maybeSpawnDrop(ex2, ey2, e.elite, e.goblin);
          if (e.goblin) goblinsCaught++;
          enemies.splice(i, 1);
          const baseGain = e.goblin ? 120 : 20 + (e.elite ? 40 : 0);
          const comboBonus = 1 + combo * 0.05;
          score += Math.round(baseGain * comboBonus);
          scoreLabel.textContent = "Score: " + score;
          combo++;
          comboTimer = 0.6;
          comboLabel.textContent = "Combo: " + combo;
          SFX.comboUp();
        }
      }
    }
  }

  // ---------- SUMMARY & META REWARD ----------
  function showSummary() {
    msg.innerHTML = "";
    state = "gameover";

    const timeSurvived = Math.floor(elapsed);
    const baseCoins = Math.floor(score / 100) + Math.floor(timeSurvived / 30) + miniBossesKilled * 5 + goblinsCaught * 3 + nukesUsed * 2;
    const coinsEarned = Math.max(1, baseCoins);
    meta.hellcoins += coinsEarned;

    // Simple auto-spend suggestion: every 20 coins, auto-upgrade something small
    let coinsToSpend = meta.hellcoins;
    while (coinsToSpend >= 20) {
      coinsToSpend -= 20;
      const roll = Math.random();
      if (roll < 0.2) meta.maxHpBonus++;
      else if (roll < 0.4) meta.speedBonus++;
      else if (roll < 0.6) meta.fireRateBonus++;
      else if (roll < 0.75) meta.droneBonus++;
      else if (roll < 0.9) meta.dashChargeBonus++;
      else meta.critBonus++;
    }
    meta.hellcoins = coinsToSpend;
    saveMeta();
    updateMetaUI();

    const funnyDeath = randomFrom([
      "You died. Again.",
      "Skill issue detected.",
      "Try dodging next time.",
      "Bro got cooked.",
      "Unlucky. (It wasn't.)"
    ]);

    summaryStats.innerHTML =
      `${funnyDeath}<br><br>` +
      `Time: ${timeSurvived}s<br>` +
      `Score: ${score}<br>` +
      `Max Combo: ${maxComboReached}<br>` +
      `Max Heat: ${maxHeatReached.toFixed(1)}<br>` +
      `Mini-Bosses: ${miniBossesKilled}<br>` +
      `Goblins Caught: ${goblinsCaught}<br>` +
      `Nukes Used: ${nukesUsed}<br>` +
      `Hellcoins Earned: ${coinsEarned}<br><br>` +
      `Meta Upgrades auto-applied.`;

    summaryOverlay.style.display = "flex";
  }

  // ---------- RENDER ----------
  function render() {
    let offsetX = 0, offsetY = 0;
    if (shakeTime > 0) {
      const s = shakeStrength * (shakeTime);
      offsetX = (Math.random() - 0.5) * s;
      offsetY = (Math.random() - 0.5) * s;
    }

    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.clearRect(-20, -20, W + 40, H + 40);

    ctx.fillStyle = "#12091f";
    ctx.fillRect(0, 0, W, H);

    const t = lastTime;
    const scroll = score * 0.05 + t * 10;

    ctx.fillStyle = "#241533";
    for (let i = 0; i < 6; i++) {
      const x = (i * 260 - (scroll * 0.3) % 260);
      ctx.beginPath();
      ctx.moveTo(x - 80, H * 0.7);
      ctx.lineTo(x + 80, H * 0.4);
      ctx.lineTo(x + 240, H * 0.7);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "#2f1b3f";
    for (let i = 0; i < 8; i++) {
      const x = (i * 200 - (scroll * 0.6) % 200);
      ctx.beginPath();
      ctx.ellipse(x, H * 0.75, 180, 70, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "#3b2b1b";
    ctx.fillRect(0, H - 80, W, 80);
    ctx.fillStyle = "#5b3b1b";
    for (let i = 0; i < W; i += 40) {
      ctx.fillRect(i, H - 82, 30, 6);
    }

    // Danger zones
    dangerZones.forEach(z => {
      const alpha = z.exploded ? 0.2 : Math.max(0.2, z.timer / 2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = z.exploded ? "#ff5533" : "#ffaa55";
      ctx.beginPath();
      ctx.ellipse(z.x, z.y, z.radius, z.radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Afterimages
    afterimages.forEach(a => {
      const alpha = Math.max(0, a.life / 0.25);
      ctx.save();
      ctx.globalAlpha = alpha * 0.6;
      ctx.translate(a.x + player.w / 2, a.y + player.h / 2);
      ctx.scale(a.facing, 1);
      ctx.translate(-player.w / 2, -player.h / 2);
      ctx.fillStyle = "#88ddff";
      ctx.fillRect(8, 18, player.w - 16, 30);
      ctx.restore();
    });

    // Player
    const p = player;
    const flicker = p.invuln > 0 && Math.floor(p.invuln * 20) % 2 === 0;
    if (!flicker) {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.scale(p.facing, 1);
      ctx.translate(-p.w / 2, -p.h / 2);

      ctx.fillStyle = "#222";
      ctx.fillRect(10, p.h - 20, 8, 20);
      ctx.fillRect(p.w - 18, p.h - 20, 8, 20);

      ctx.fillStyle = "#4444aa";
      ctx.fillRect(8, 18, p.w - 16, 30);

      ctx.fillStyle = "#f5e0c8";
      ctx.beginPath();
      ctx.ellipse(p.w / 2, 16, 18, 16, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#000";
      ctx.fillRect(p.w / 2 - 6, 10, 4, 8);
      ctx.fillRect(p.w / 2 + 2, 10, 4, 8);

      ctx.strokeStyle = "#ddd";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.roundRect(p.w / 2 - 16, 2, 32, 10, 4);
      ctx.stroke();

      ctx.strokeStyle = "#ff5555";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(p.w / 2 + 6, 2);
      ctx.lineTo(p.w / 2 + 18, -10);
      ctx.stroke();

      ctx.restore();
    }

    // Drones
    drones.forEach(d => {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.fillStyle = "#88ddff";
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Bullets
    bullets.forEach(b => {
      ctx.save();
      ctx.translate(b.x + b.w / 2, b.y + b.h / 2);
      const ang = Math.atan2(b.vy, b.vx);
      ctx.rotate(ang);
      ctx.fillStyle = b.explosive ? "#ffbb66" : "#ffdd88";
      ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
      ctx.restore();
    });

    // Enemy bullets
    enemyBullets.forEach(eb => {
      ctx.fillStyle = eb.color;
      ctx.beginPath();
      ctx.ellipse(eb.x, eb.y, eb.w / 2, eb.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Enemies
    enemies.forEach(e => {
      ctx.save();
      ctx.translate(e.x + e.w / 2, e.y + e.h / 2);
      let col = e.color;
      if (e.flash > 0) col = "#ffffff";
      ctx.fillStyle = col;
      ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
      ctx.fillStyle = "#000";
      ctx.fillRect(-10, -10, 6, 10);
      ctx.fillRect(4, -10, 6, 10);
      if (e.goblin) {
        ctx.fillStyle = "#00aa44";
        ctx.fillRect(-e.w / 2, -e.h / 2 - 6, e.w, 6);
      }
      ctx.restore();
    });

    // Mini-boss
    if (miniBoss) {
      const b = miniBoss;
      ctx.save();
      ctx.translate(b.x + b.w / 2, b.y + b.h / 2);

      let phaseColor = b.phase === 1 ? "#ff7777" : b.phase === 2 ? "#ffbb55" : "#ff66ff";
      if (b.flash > 0) phaseColor = "#ffffff";
      ctx.fillStyle = phaseColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#000";
      ctx.fillRect(-20, -10, 8, 16);
      ctx.fillRect(12, -10, 8, 16);
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 10, 18, 0.2 * Math.PI, 0.8 * Math.PI);
      ctx.stroke();

      if (b.telegraph > 0) {
        const alpha = Math.max(0, b.telegraph * 2);
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.ellipse(0, 0, b.w / 2 + 8, b.h / 2 + 8, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    // Drops
    drops.forEach(d => {
      let col = "#88ff88";
      if (d.type === "buff") col = "#88ddff";
      if (d.type === "upgrade") col = d.rarity === "legendary" ? "#ffdd55" : "#ff99ff";
      if (d.type === "nukeShard") col = "#ff8844";
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.w / 2, d.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Particles
    particles.forEach(pa => {
      ctx.globalAlpha = Math.max(0, pa.life * 2);
      ctx.fillStyle = pa.color;
      ctx.fillRect(pa.x, pa.y, 4, 4);
      ctx.globalAlpha = 1;
    });

    ctx.restore();

    // Toasts (HTML overlay)
    toastLayer.innerHTML = "";
    toasts.forEach(t => {
      const div = document.createElement("div");
      div.textContent = t.text;
      div.style.position = "absolute";
      div.style.left = (t.x / W * 100) + "%";
      div.style.top = (t.y / H * 100) + "%";
      div.style.transform = "translate(-50%, -50%)";
      div.style.fontSize = t.size + "px";
      const alpha = Math.max(0, t.life / t.maxLife);
      div.style.color = t.color;
      div.style.opacity = alpha.toFixed(2);
      div.style.textShadow = "0 0 6px #000";
      div.style.whiteSpace = "nowrap";
      toastLayer.appendChild(div);
    });
  }

  // ---------- LOOP ----------
  function loop(timestamp) {
    const t = timestamp / 1000;
    const dt = Math.min(0.033, t - lastTime || 0.016);
    lastTime = t;

    update(dt);
    render();

    requestAnimationFrame(loop);
  }

  loadMeta();
  pickDailyMutator();
  resetGame();
  requestAnimationFrame(loop);

  window.addEventListener("touchstart", () => {
    initAudio();
    if (state === "intro") {
      state = "playing";
      msg.textContent = "";
    }
  }, { passive: true });

  window.addEventListener("click", () => {
    initAudio();
    if (state === "intro") {
      state = "playing";
      msg.textContent = "";
    }
  });
})();
</script>
